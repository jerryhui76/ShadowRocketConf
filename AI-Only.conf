[General]
loglevel = notify
ipv6 = false
prefer-ipv4 = true
dns-server = 8.8.8.8,1.1.1.1
udp-relay = true
tcp-fast-open = true
skip-proxy = 192.168.0.0/16,10.0.0.0/8,127.0.0.1
connectivity-test = http://www.gstatic.com/generate_204

[Rule]

# Ad blocking
DOMAIN-SUFFIX,doubleclick.net,REJECT
DOMAIN-SUFFIX,googlesyndication.com,REJECT
DOMAIN-SUFFIX,googleadservices.com,REJECT
DOMAIN-SUFFIX,adservice.google.com,REJECT
DOMAIN-SUFFIX,admob.com,REJECT
DOMAIN-SUFFIX,app-measurement.com,REJECT
DOMAIN-KEYWORD,ads,REJECT
DOMAIN-KEYWORD,tracking,REJECT

# ChatGPT
DOMAIN-SUFFIX,openai.com,PROXY
DOMAIN-SUFFIX,chatgpt.com,PROXY
DOMAIN-SUFFIX,oaistatic.com,PROXY
DOMAIN-SUFFIX,oaiusercontent.com,PROXY

# Claude
DOMAIN-SUFFIX,claude.ai,PROXY
DOMAIN-SUFFIX,anthropic.com,PROXY
DOMAIN-SUFFIX,anthropicusercontent.com,PROXY

# Gemini
DOMAIN-SUFFIX,gemini.google.com,PROXY
DOMAIN-SUFFIX,ai.google.dev,PROXY
DOMAIN-SUFFIX,makersuite.google.com,PROXY

# messaging
DOMAIN-SUFFIX,whatsapp.com,PROXY
DOMAIN-SUFFIX,whatsapp.net,PROXY

# gaming
DOMAIN-SUFFIX,roblox.com,PROXY
DOMAIN-SUFFIX,rbxcdn.com,PROXY
DOMAIN-SUFFIX,minecraft.net,PROXY
DOMAIN-SUFFIX,mojang.com,PROXY

# everything else normal internet
MATCH,DIRECT
