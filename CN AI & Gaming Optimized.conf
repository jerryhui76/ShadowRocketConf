[General]
loglevel = notify
ipv6 = false
prefer-ipv4 = true
dns-server = 223.5.5.5,119.29.29.29
fallback-dns-server = 8.8.8.8,8.8.4.4
connectivity-test = http://www.gstatic.com/generate_204
skip-proxy = 192.168.0.0/16,10.0.0.0/8,127.0.0.1
